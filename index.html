<!DOCTYPE html>
<html>
<head>
<title>Stealth Chat</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

input,button,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00ff9d;
cursor:pointer;
}

.room{
background:#1e1e1e;
margin:6px auto;
padding:10px;
width:260px;
border-radius:6px;
cursor:pointer;
}

#messages{
height:300px;
overflow-y:auto;
background:black;
margin:auto;
width:420px;
padding:10px;
text-align:left;
}

img{
max-width:200px;
display:block;
margin-top:5px;
}

</style>

</head>
<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setUser()">Set Username</button>

<br><br>

<input id="roomName" placeholder="room name">

<select id="roomType">
<option value="chat">Chat Room 💬</option>
<option value="voice">Voice Room 🔊</option>
</select>

<input id="roomPassword" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h3>Available Rooms</h3>
<div id="rooms"></div>

<div id="chatBox" style="display:none">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<br>

<input id="message" placeholder="message">
<input type="file" id="imageUpload">

<br>

<button onclick="sendMessage()">Send</button>
<button onclick="leaveRoom()">Leave Room</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

/* PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyC3zgBQLFgUhHHJPLTneyGobAiICVPEvBk",
  authDomain: "random-chat-2ed9a.firebaseapp.com",
  databaseURL: "https://random-chat-2ed9a-default-rtdb.firebaseio.com",
  projectId: "random-chat-2ed9a",
  storageBucket: "random-chat-2ed9a.appspot.com",
  messagingSenderId: "608975566065",
  appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

let username=""
let currentRoom=""

function setUser(){
username=document.getElementById("username").value
alert("Username set")
}

function createRoom(){

let name=document.getElementById("roomName").value
let pass=document.getElementById("roomPassword").value
let type=document.getElementById("roomType").value

if(name==""){
alert("enter room name")
return
}

db.ref("rooms/"+name).set({
password:pass,
type:type
}).then(()=>{
alert("Room created")
})

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let box=document.getElementById("rooms")
box.innerHTML=""

snap.forEach(room=>{

let data=room.val()
let name=room.key

let div=document.createElement("div")
div.className="room"

let icon=data.type=="voice"?"🔊":"💬"

if(data.password){
div.innerText=name+" "+icon+" 🔒"
}else{
div.innerText=name+" "+icon
}

div.onclick=()=>joinRoom(name,data)

box.appendChild(div)

})

})

}

function joinRoom(name,data){

if(data.password){

let p=prompt("Enter password")

if(p!=data.password){
alert("wrong password")
return
}

}

currentRoom=name

document.getElementById("chatBox").style.display="block"
document.getElementById("roomTitle").innerText=name
document.getElementById("messages").innerHTML=""

listenMessages()

}

function listenMessages(){

db.ref("messages/"+currentRoom).off()

db.ref("messages/"+currentRoom).on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){

let img=document.createElement("img")
img.src=m.img
div.appendChild(img)

}

document.getElementById("messages").appendChild(div)

})

}

function sendMessage(){

let text=document.getElementById("message").value
let file=document.getElementById("imageUpload").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){

db.ref("messages/"+currentRoom).push({
user:username,
text:text,
img:e.target.result
})

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push({
user:username,
text:text
})

}

document.getElementById("message").value=""
document.getElementById("imageUpload").value=""

}

function leaveRoom(){

currentRoom=""
document.getElementById("chatBox").style.display="none"

}

loadRooms()

</script>

</body>
</html>
