<!DOCTYPE html>
<html>
<head>

<title>Chat Rooms</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

#container{
width:70%;
margin:auto;
}

#rooms{
border:1px solid gray;
background:#1a1a1a;
padding:15px;
margin-bottom:20px;
}

.room{
padding:10px;
border-bottom:1px solid gray;
}

#chat{
border:1px solid gray;
height:300px;
overflow:auto;
background:#1a1a1a;
padding:10px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Public Chat Rooms</h1>

<div id="container">

<input id="username" placeholder="Username">

<br>

<input id="roomName" placeholder="Create room name">
<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

<h3 id="roomTitle"></h3>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.firestore();

let userId=Math.random().toString(36).substring(2);
let currentRoom=null;

const badWords=["fuck","shit","bitch","ass"];

function filter(text){

badWords.forEach(word=>{
let r=new RegExp(word,"gi");
text=text.replace(r,"****");
});

return text;

}

function createRoom(){

let name=document.getElementById("roomName").value.trim();

if(!name)return;

db.collection("rooms").doc(name).set({
created:Date.now()
});

joinRoom(name);

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let room=doc.id;

db.collection("rooms").doc(room).collection("users")
.get()
.then(users=>{

let count=users.size;

html+=`
<div class="room">
<b>${room}</b> (${count} users)
<button onclick="joinRoom('${room}')">Join</button>
</div>
`;

document.getElementById("rooms").innerHTML=html;

});

});

});

}

function joinRoom(room){

currentRoom=room;

document.getElementById("roomTitle").innerText="Room: "+room;

db.collection("rooms")
.doc(room)
.collection("users")
.doc(userId)
.set({joined:Date.now()});

db.collection("rooms")
.doc(room)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
html+="<p>"+doc.data().text+"</p>";
});

document.getElementById("chat").innerHTML=html;

});

}

function send(){

if(!currentRoom)return;

let name=document.getElementById("username").value||"Anonymous";

let message=document.getElementById("msg").value;

message=filter(message);

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.add({
text:name+": "+message,
time:Date.now()
});

document.getElementById("msg").value="";

}

window.addEventListener("beforeunload",leaveRoom);

function leaveRoom(){

if(!currentRoom)return;

let roomRef=db.collection("rooms").doc(currentRoom);

roomRef.collection("users").doc(userId).delete().then(()=>{

roomRef.collection("users").get().then(snapshot=>{

if(snapshot.size===0){

roomRef.delete();

}

});

});

}

loadRooms();

</script>

</body>
</html>
