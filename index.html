<!DOCTYPE html>
<html>
<head>
<title>Stealth Chat</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.room{
background:#222;
padding:10px;
margin:5px auto;
width:250px;
cursor:pointer;
border-radius:6px;
}

#messages{
height:300px;
overflow-y:auto;
background:black;
margin:auto;
width:400px;
padding:10px;
}

img{
max-width:200px;
display:block;
margin-top:5px;
}

</style>

</head>
<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setUser()">Set Username</button>

<br><br>

<input id="roomName" placeholder="room name">

<select id="roomType">
<option value="chat">Chat Room</option>
<option value="voice">Voice Room</option>
</select>

<input id="roomPass" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

<div id="chatUI" style="display:none">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="message">
<input type="file" id="image">

<br>

<button onclick="send()">Send</button>
<button onclick="leave()">Leave</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain:"random-chat-2ed9a.firebaseapp.com",
databaseURL:"https://random-chat-2ed9a-default-rtdb.firebaseio.com",
projectId:"random-chat-2ed9a"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

let username=""
let currentRoom=""

function setUser(){

username=document.getElementById("username").value

alert("username set")

}

function createRoom(){

let name=document.getElementById("roomName").value
let pass=document.getElementById("roomPass").value
let type=document.getElementById("roomType").value

db.ref("rooms/"+name).set({

password:pass,
type:type

})

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let box=document.getElementById("rooms")
box.innerHTML=""

snap.forEach(r=>{

let data=r.val()
let name=r.key

let div=document.createElement("div")
div.className="room"

let icon=data.type=="voice"?"🔊":"💬"

if(data.password){
div.innerText=name+" "+icon+" 🔒"
}else{
div.innerText=name+" "+icon
}

div.onclick=()=>joinRoom(name,data)

box.appendChild(div)

})

})

}

function joinRoom(name,data){

if(data.password){

let p=prompt("password")

if(p!=data.password)return

}

currentRoom=name

document.getElementById("chatUI").style.display="block"
document.getElementById("roomTitle").innerText=name

listen()

}

function listen(){

db.ref("messages/"+currentRoom).on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){

let img=document.createElement("img")
img.src=m.img

div.appendChild(img)

}

document.getElementById("messages").appendChild(div)

})

}

function send(){

let text=document.getElementById("message").value
let file=document.getElementById("image").files[0]

if(file){

let reader=new FileReader()

reader.onload=e=>{

db.ref("messages/"+currentRoom).push({

user:username,
text:text,
img:e.target.result

})

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push({

user:username,
text:text

})

}

}

function leave(){

currentRoom=""

document.getElementById("messages").innerHTML=""
document.getElementById("chatUI").style.display="none"

}

loadRooms()

</script>

</body>
</html>
