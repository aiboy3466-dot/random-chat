<!DOCTYPE html>
<html>
<head>
<title>Stealth Chat</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9c;
}

input,button{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

button{
background:#00ff9c;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1b1b1b;
padding:10px;
margin:6px auto;
width:260px;
border-radius:6px;
cursor:pointer;
}

#chat{
display:none;
margin-top:20px;
}

#messages{
height:300px;
width:420px;
margin:auto;
overflow-y:auto;
background:black;
border:1px solid #00ff9c;
padding:10px;
text-align:left;
}

img{
max-width:200px;
display:block;
margin-top:5px;
}

</style>

</head>
<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setUsername()">Set Username</button>

<br>

<input id="roomName" placeholder="room name">
<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>
<div id="rooms"></div>

<div id="chat">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="message" placeholder="message">
<input type="file" id="image">

<br>

<button onclick="sendMessage()">Send</button>
<button onclick="leaveRoom()">Leave Room</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPITNeyGobAiLCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
databaseURL: "https://random-chat-2ed9a-default-rtdb.firebaseio.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let username=""
let currentRoom=""

function setUsername(){

username=document.getElementById("username").value

if(username==""){
alert("Enter username")
return
}

alert("Username set")

}

function createRoom(){

let room=document.getElementById("roomName").value

if(room==""){
alert("Enter room name")
return
}

db.ref("rooms/"+room).set({
created:Date.now()
}).then(()=>{

alert("Room created")

})

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snap.forEach(child=>{

let room=child.key

let div=document.createElement("div")

div.className="room"

div.innerText=room

div.onclick=function(){

joinRoom(room)

}

roomsDiv.appendChild(div)

})

})

}

function joinRoom(room){

currentRoom=room

document.getElementById("chat").style.display="block"

document.getElementById("roomTitle").innerText="Room: "+room

listenMessages()

}

function listenMessages(){

db.ref("messages/"+currentRoom).off()

db.ref("messages/"+currentRoom).on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){

let img=document.createElement("img")

img.src=m.img

div.appendChild(img)

}

document.getElementById("messages").appendChild(div)

})

}

function sendMessage(){

let text=document.getElementById("message").value
let file=document.getElementById("image").files[0]

let msg={
user:username,
text:text
}

if(file){

let reader=new FileReader()

reader.onload=function(e){

msg.img=e.target.result

db.ref("messages/"+currentRoom).push(msg)

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push(msg)

}

document.getElementById("message").value=""
document.getElementById("image").value=""

}

function leaveRoom(){

currentRoom=""

document.getElementById("messages").innerHTML=""

document.getElementById("chat").style.display="none"

}

loadRooms()

</script>

</body>
</html>
