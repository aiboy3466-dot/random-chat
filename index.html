<!DOCTYPE html>
<html>
<head>
<title>Random Stranger Chat</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#chat{
width:80%;
height:300px;
margin:auto;
border:1px solid gray;
overflow:auto;
padding:10px;
background:#1a1a1a;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px;
margin:5px;
}
</style>

</head>

<body>

<h1>Random Stranger Chat</h1>

<p id="status">Click Start</p>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>

<br><br>

<button onclick="start()">Start Chat</button>
<button onclick="next()">Next Stranger</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let myId = Math.random().toString(36).substring(2);
let room = null;

function start(){

document.getElementById("status").innerText="Looking for stranger...";

db.collection("waiting").doc(myId).set({
online:true
});

db.collection("waiting").get().then(snapshot=>{

if(snapshot.size>1){

snapshot.forEach(doc=>{

if(doc.id!=myId && !room){

room="room_"+doc.id+"_"+myId;

db.collection("waiting").doc(doc.id).delete();
db.collection("waiting").doc(myId).delete();

connectRoom();

}

});

}

});

}

function connectRoom(){

document.getElementById("status").innerText="Connected to stranger";

db.collection("rooms").doc(room).onSnapshot(doc=>{

let data=doc.data();

if(data && data.msg){
add("Stranger: "+data.msg);
}

});

}

function sendMsg(){

let m=document.getElementById("msg").value;

db.collection("rooms").doc(room).set({
msg:m
});

add("You: "+m);

document.getElementById("msg").value="";

}

function add(t){

let c=document.getElementById("chat");

c.innerHTML+="<p>"+t+"</p>";

c.scrollTop=c.scrollHeight;

}

function next(){

location.reload();

}

</script>

</body>
</html>
