<!DOCTYPE html>
<html>
<head>
<title>Chat Rooms</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#rooms{
border:1px solid gray;
width:60%;
margin:auto;
padding:10px;
margin-bottom:20px;
}

#chat{
border:1px solid gray;
width:60%;
height:250px;
margin:auto;
overflow:auto;
padding:10px;
background:#1a1a1a;
}

button{
padding:8px;
margin:5px;
}

input{
padding:8px;
width:50%;
}

</style>
</head>

<body>

<h1>Public Chat Rooms</h1>

<button onclick="createRoom()">Create Room</button>

<h3>Available Rooms</h3>

<div id="rooms"></div>

<h3 id="roomTitle"></h3>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

let currentRoom = null;

function createRoom(){

let roomId = "room_"+Math.floor(Math.random()*100000);

db.collection("rooms").doc(roomId).set({
created:Date.now()
});

joinRoom(roomId);

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

html += "<p>"+doc.id+" <button onclick='joinRoom(\""+doc.id+"\")'>Join</button></p>";

});

document.getElementById("rooms").innerHTML = html;

});

}

function joinRoom(roomId){

currentRoom = roomId;

document.getElementById("roomTitle").innerText = "Room: "+roomId;

db.collection("rooms").doc(roomId).collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let chat="";

snapshot.forEach(doc=>{

chat += "<p>"+doc.data().text+"</p>";

});

document.getElementById("chat").innerHTML = chat;

});

}

function send(){

let m = document.getElementById("msg").value;

db.collection("rooms").doc(currentRoom).collection("messages").add({

text:m,
time:Date.now()

});

document.getElementById("msg").value="";

}

loadRooms();

</script>

</body>
</html>
