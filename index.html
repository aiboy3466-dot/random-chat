<!DOCTYPE html>
<html>
<head>

<title>Stealth Chat</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ffa2;
}

input,button,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00ffa2;
cursor:pointer;
}

.room{
background:#1c1c1c;
padding:10px;
margin:6px auto;
width:260px;
border-radius:6px;
cursor:pointer;
}

#messages{
height:300px;
width:420px;
margin:auto;
overflow-y:auto;
background:black;
padding:10px;
text-align:left;
}

img{
max-width:200px;
display:block;
margin-top:6px;
}

</style>

</head>

<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setUser()">Set Username</button>

<br><br>

<input id="roomName" placeholder="room name">

<select id="roomType">
<option value="chat">Chat Room 💬</option>
<option value="voice">Voice Room 🔊</option>
</select>

<input id="roomPassword" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

<div id="chatUI" style="display:none">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<br>

<input id="message" placeholder="message">
<input type="file" id="imageUpload">

<br>

<button onclick="sendMessage()">Send</button>
<button onclick="leaveRoom()">Leave Room</button>
<button onclick="startVoice()">Enable Mic</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

/* PASTE YOUR FIREBASE CONFIG HERE */

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPLTneyGobAiICVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
databaseURL: "https://random-chat-2ed9a-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.appspot.com",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let username=""
let currentRoom=""
  
let localStream
let peerConnection

const servers = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
}
function setUser(){

username=document.getElementById("username").value

alert("Username set")

}

function createRoom(){

let name=document.getElementById("roomName").value
let pass=document.getElementById("roomPassword").value
let type=document.getElementById("roomType").value

if(name==""){
alert("Enter room name")
return
}

db.ref("rooms/"+name).set({

password:pass,
type:type,
users:0

})

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let box=document.getElementById("rooms")

box.innerHTML=""

snap.forEach(room=>{

let data=room.val()
let name=room.key

let icon=data.type=="voice"?"🔊":"💬"

let div=document.createElement("div")
div.className="room"

if(data.password){
div.innerText=name+" "+icon+" 🔒 ("+data.users+" users)"
}else{
div.innerText=name+" "+icon+" ("+data.users+" users)"
}

div.onclick=()=>joinRoom(name,data)

box.appendChild(div)

})

})

}

function joinRoom(name,data){
  
if(username==""){
alert("Set username first")
return
}
  
if(data.password){

let p=prompt("Enter password")

if(p!=data.password){
alert("Wrong password")
return
}

}

currentRoom=name

db.ref("rooms/"+name+"/users").transaction(n=> (n||0)+1)

document.getElementById("chatUI").style.display="block"
document.getElementById("roomTitle").innerText=name

document.getElementById("messages").innerHTML=""

listenMessages()

}

function listenMessages(){

db.ref("messages/"+currentRoom).off()

db.ref("messages/"+currentRoom).on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){

let img=document.createElement("img")
img.src=m.img
div.appendChild(img)

}

document.getElementById("messages").appendChild(div)
document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight
})

}

function sendMessage(){

let text=document.getElementById("message").value
let file=document.getElementById("imageUpload").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){

db.ref("messages/"+currentRoom).push({

user:username,
text:text,
img:e.target.result

})

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push({

user:username,
text:text

})

}

document.getElementById("message").value=""
document.getElementById("imageUpload").value=""

}

function leaveRoom(){

db.ref("rooms/"+currentRoom+"/users").transaction(n=> (n||1)-1)

currentRoom=""

document.getElementById("messages").innerHTML=""
document.getElementById("chatUI").style.display="none"

}

loadRooms()
async function startVoice(){

localStream = await navigator.mediaDevices.getUserMedia({
audio:true
})

const audio=document.createElement("audio")
audio.srcObject=localStream
audio.muted=true
audio.play()

alert("Microphone enabled")

}

async function startCall(){

peerConnection=new RTCPeerConnection(servers)

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream)
})

peerConnection.ontrack=event=>{
const audio=document.createElement("audio")
audio.srcObject=event.streams[0]
audio.autoplay=true
document.body.appendChild(audio)
}

}
</script>

</body>
</html>
