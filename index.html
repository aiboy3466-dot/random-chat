<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stealth Chat & Voice</title>
<style>
  body {
    background: #111;
    color: #0ff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
  }
  h2, h3 { color: #0ff; text-align:center; }
  #roomList div {
    cursor: pointer;
    margin: 5px auto;
    padding: 8px 12px;
    border: 1px solid #0ff;
    border-radius: 6px;
    width: 80%;
    display: flex;
    justify-content: space-between;
    background: #111;
    transition: 0.2s;
  }
  #roomList div:hover { background: #222; }
  #chatContainer, #voiceContainer {
    display: none;
    margin: 10px auto;
    width: 90%;
    max-width: 500px;
    border: 1px solid #0ff;
    border-radius: 8px;
    padding: 10px;
    background: #111;
  }
  #messages {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #0ff;
    padding: 5px;
    margin-bottom: 5px;
  }
  #messages div img {
    max-width: 100%;
    border-radius: 4px;
  }
  input, button { 
    background: #111; 
    color: #0ff; 
    border: 1px solid #0ff; 
    padding: 5px; 
    border-radius: 4px; 
  }
  button:hover { background: #222; cursor:pointer; }
</style>
</head>
<body>

<h2>Stealth Chat & Voice Rooms</h2>
<h3>Available Rooms</h3>
<div id="roomList"></div>

<div id="chatContainer">
  <h3 id="chatRoomName"></h3>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type a message">
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="sendMessage()">Send</button>
  <button onclick="leaveRoom()">Leave Room</button>
</div>

<div id="voiceContainer">
  <h3 id="voiceRoomName"></h3>
  <audio id="localAudio" autoplay muted></audio>
  <button onclick="leaveRoom()">Leave Voice</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
  // ---- FIREBASE CONFIG ----
const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  let currentRoom = null;
  let chatUnsub = null;

  // ---- LOAD ROOMS ----
  async function loadRooms(){
    const roomListDiv = document.getElementById("roomList");
    roomListDiv.innerHTML = "";
    const snapshot = await db.collection("rooms").get();
    snapshot.forEach(doc => {
      const data = doc.data();
      const div = document.createElement("div");
      div.innerHTML = `<span>${data.name}</span>${data.private ? "🔒" : ""}`;
      div.onclick = async () => {
        if(data.private){
          const pw = prompt("Enter password for " + data.name);
          if(pw !== data.password) return alert("Wrong password!");
        }
        joinChatRoom(data.name);
      };
      roomListDiv.appendChild(div);
    });
  }

  loadRooms();

  // ---- JOIN CHAT ROOM ----
  function joinChatRoom(roomName){
    leaveRoom(); // remove previous box
    currentRoom = roomName;
    document.getElementById("chatRoomName").innerText = roomName;
    document.getElementById("chatContainer").style.display = "block";
    const msgDiv = document.getElementById("messages");
    msgDiv.innerHTML = "";

    // Listen to messages
    chatUnsub = db.collection("rooms").doc(roomName).collection("messages").orderBy("time")
      .onSnapshot(snapshot => {
        msgDiv.innerHTML = "";
        snapshot.forEach(doc => {
          const m = doc.data();
          const div = document.createElement("div");
          if(m.type === "text") div.textContent = m.sender + ": " + m.text;
          else if(m.type === "image"){
            const img = document.createElement("img");
            img.src = m.url;
            div.appendChild(img);
          }
          msgDiv.appendChild(div);
        });
        msgDiv.scrollTop = msgDiv.scrollHeight;
      });
  }

  // ---- SEND MESSAGE ----
  async function sendMessage(){
    if(!currentRoom) return;
    const msgInput = document.getElementById("msgInput");
    const imageInput = document.getElementById("imageInput");

    if(imageInput.files[0]){
      const file = imageInput.files[0];
      const ref = storage.ref().child('images/'+Date.now()+"_"+file.name);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      db.collection("rooms").doc(currentRoom).collection("messages").add({
        type: "image",
        url: url,
        sender: "Anonymous",
        time: Date.now()
      });
      imageInput.value = "";
    }

    if(msgInput.value.trim() !== ""){
      db.collection("rooms").doc(currentRoom).collection("messages").add({
        type: "text",
        text: msgInput.value,
        sender: "Anonymous",
        time: Date.now()
      });
      msgInput.value = "";
    }
  }

  // ---- LEAVE ROOM ----
  function leaveRoom(){
    if(chatUnsub) chatUnsub(); 
    chatUnsub = null;
    currentRoom = null;
    document.getElementById("chatContainer").style.display = "none";
    document.getElementById("voiceContainer").style.display = "none";
  }

  // Optional: voice chat setup here (WebRTC) 
  // Placeholder since full voice chat is more complex, requires signaling server
</script>

</body>
</html>
