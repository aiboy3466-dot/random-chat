<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stealth Chat</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9d;
}

input,button,select{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

button{
background:#00ff9d;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1a1a1a;
padding:10px;
margin:6px auto;
width:260px;
border-radius:6px;
cursor:pointer;
}

#chat{
display:none;
margin-top:20px;
}

#messages{
height:300px;
overflow-y:auto;
background:black;
border:1px solid #00ff9d;
padding:10px;
width:420px;
margin:auto;
}

img{
max-width:200px;
display:block;
margin-top:6px;
}

</style>
</head>

<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setName()">Set Username</button>

<br>

<input id="roomName" placeholder="room name">
<input id="roomPass" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h2>Rooms</h2>

<div id="rooms"></div>

<div id="chat">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="message" placeholder="message">

<input type="file" id="img">

<br>

<button onclick="send()">Send</button>
<button onclick="startVC()">Voice Chat</button>
<button onclick="leave()">Leave</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore()
const storage=firebase.storage()

let username=""
let currentRoom=""
let roomPassword=""

function setName(){

username=document.getElementById("username").value

if(username===""){
alert("enter username")
return
}

alert("Username set: "+username)

}

async function createRoom(){

try{

let room=document.getElementById("roomName").value
let pass=document.getElementById("roomPass").value

if(room===""){
alert("enter room name")
return
}

await db.collection("rooms").doc(room).set({
password:pass,
created:Date.now()
})

document.getElementById("roomName").value=""
document.getElementById("roomPass").value=""

}catch(e){

console.error(e)
alert("room creation failed")

}

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snapshot.forEach(doc=>{

let data=doc.data()

let div=document.createElement("div")

div.className="room"

div.innerText=data.password?doc.id+" 🔒":doc.id

div.onclick=()=>joinRoom(doc.id,data)

roomsDiv.appendChild(div)

})

})

}

function joinRoom(room,data){

if(data.password){

let p=prompt("enter password")

if(p!==data.password){

alert("wrong password")

return

}

}

currentRoom=room

document.getElementById("chat").style.display="block"

document.getElementById("roomTitle").innerText=room

listenMessages()

}

function listenMessages(){

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let box=document.getElementById("messages")

box.innerHTML=""

snapshot.forEach(doc=>{

let m=doc.data()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){
let img=document.createElement("img")
img.src=m.img
div.appendChild(img)
}

box.appendChild(div)

})

box.scrollTop=box.scrollHeight

})

}

async function send(){

try{

let text=document.getElementById("message").value
let file=document.getElementById("img").files[0]

let imgURL=""

if(file){

let ref=storage.ref("images/"+Date.now()+file.name)

await ref.put(file)

imgURL=await ref.getDownloadURL()

}

await db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.add({

user:username,
text:text,
img:imgURL,
time:Date.now()

})

document.getElementById("message").value=""
document.getElementById("img").value=""

}catch(e){

console.error(e)
alert("message failed")

}

}

function leave(){

currentRoom=""

document.getElementById("chat").style.display="none"

}

async function startVC(){

try{

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

let audio=new Audio()

audio.srcObject=stream

audio.play()

alert("voice chat started")

}catch(e){

alert("microphone blocked")

}

}

loadRooms()

</script>

</body>
</html>
