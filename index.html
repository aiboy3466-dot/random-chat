<!DOCTYPE html>
<html>
<head>
<title>Random Chat</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

#chatbox{
width:80%;
height:300px;
border:1px solid gray;
margin:auto;
overflow:auto;
padding:10px;
background:#1a1a1a;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px;
margin:5px;
}
</style>

</head>

<body>

<h1>Random Stranger Chat</h1>

<div id="chatbox"></div>

<br>

<input id="message" placeholder="type message...">
<button onclick="sendMessage()">Send</button>

<br><br>

<button onclick="startChat()">Start Chat</button>
<button onclick="nextChat()">Next Person</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey: "YOURKEY",
authDomain: "YOURDOMAIN",
projectId: "YOURPROJECTID"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let chatRoom = null;

function startChat(){

chatRoom = "room_" + Math.floor(Math.random()*100000);

document.getElementById("chatbox").innerHTML += "<p>Connected to stranger</p>";

db.collection("rooms").doc(chatRoom).onSnapshot(doc=>{
let data = doc.data();
if(data && data.message){
addMessage("Stranger: " + data.message);
}
});

}

function sendMessage(){

let msg = document.getElementById("message").value;

db.collection("rooms").doc(chatRoom).set({
message:msg
});

addMessage("You: "+msg);

document.getElementById("message").value="";

}

function addMessage(text){
let box = document.getElementById("chatbox");
box.innerHTML += "<p>"+text+"</p>";
box.scrollTop = box.scrollHeight;
}

function nextChat(){
location.reload();
}

</script>

</body>
</html>
