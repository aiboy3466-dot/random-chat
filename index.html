<!DOCTYPE html>
<html>
<head>

<title>Chat Rooms</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
margin:0;
}

#container{
max-width:800px;
margin:auto;
padding:10px;
}

#rooms{
border:1px solid gray;
background:#1a1a1a;
padding:15px;
margin-bottom:20px;
}

.room{
padding:10px;
border-bottom:1px solid gray;
display:flex;
justify-content:space-between;
}

#chat{
border:1px solid gray;
height:300px;
overflow:auto;
background:#1a1a1a;
padding:10px;
text-align:left;
}

#typing{
color:#00ff9c;
font-size:14px;
}

input{
padding:8px;
margin:5px;
width:60%;
}

button{
padding:8px 14px;
cursor:pointer;
}

.message{
margin:6px 0;
display:flex;
align-items:center;
}

.avatar{
width:28px;
height:28px;
border-radius:50%;
margin-right:8px;
}

@media (max-width:600px){

input{
width:90%;
}

}

</style>

</head>

<body>

<h2>Public Chat Rooms</h2>

<div id="container">

<input id="username" placeholder="Username">

<br>

<input id="roomName" placeholder="Room name">
<input id="roomPass" placeholder="Password (optional)">
<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

<h3 id="roomTitle"></h3>

<div id="chat"></div>

<div id="typing"></div>

<br>

<input id="msg" placeholder="Message" oninput="typing()">
<button onclick="send()">Send</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.firestore();

let userId=Math.random().toString(36).substring(2);
let currentRoom=null;

function avatar(name){
return "https://api.dicebear.com/7.x/identicon/svg?seed="+name;
}

function createRoom(){

let name=document.getElementById("roomName").value.trim();
let pass=document.getElementById("roomPass").value;

if(!name)return;

db.collection("rooms").doc(name).set({
users:0,
password:pass
});

joinRoom(name);

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let data=doc.data();

html+=`
<div class="room">
<span>${doc.id} (${data.users || 0})</span>
<button onclick="joinRoom('${doc.id}')">Join</button>
</div>
`;

});

document.getElementById("rooms").innerHTML=html;

});

}

function joinRoom(room){

if(currentRoom)return;

let ref=db.collection("rooms").doc(room);

ref.get().then(doc=>{

let data=doc.data();

if(data.password){

let entered=prompt("Room password:");

if(entered!==data.password){

alert("Wrong password");

return;

}

}

currentRoom=room;

document.getElementById("roomTitle").innerText="Room: "+room;

ref.update({
users:firebase.firestore.FieldValue.increment(1)
});

ref.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let d=doc.data();

html+=`
<div class="message">
<img class="avatar" src="${avatar(d.user)}">
<span><b>${d.user}</b>: ${d.text}</span>
</div>
`;

});

document.getElementById("chat").innerHTML=html;

});

});

}

function send(){

if(!currentRoom)return;

let name=document.getElementById("username").value||"Anonymous";
let message=document.getElementById("msg").value;

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.add({
user:name,
text:message,
time:Date.now()
});

document.getElementById("msg").value="";

}

function typing(){

if(!currentRoom)return;

let name=document.getElementById("username").value||"Someone";

db.collection("rooms")
.doc(currentRoom)
.collection("typing")
.doc("status")
.set({
user:name,
time:Date.now()
});

}

function listenTyping(){

if(!currentRoom)return;

db.collection("rooms")
.doc(currentRoom)
.collection("typing")
.doc("status")
.onSnapshot(doc=>{

if(doc.exists){

let data=doc.data();

document.getElementById("typing").innerText=data.user+" is typing...";

setTimeout(()=>{

document.getElementById("typing").innerText="";

},2000);

}

});

}

function leaveRoom(){

if(!currentRoom)return;

let ref=db.collection("rooms").doc(currentRoom);

ref.get().then(doc=>{

if(doc.exists){

let users=(doc.data().users||1)-1;

if(users<=0){

ref.delete();

}else{

ref.update({users:users});

}

}

});

}

window.addEventListener("beforeunload",leaveRoom);

loadRooms();

</script>

</body>
</html>
