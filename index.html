<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stealth Chat</title>
<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9d;
}

input,button,select{
padding:8px;
margin:5px;
border:none;
border-radius:6px;
}

button{
background:#00ff9d;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1b1b1b;
padding:10px;
margin:5px auto;
width:250px;
border-radius:6px;
cursor:pointer;
}

#chatBox,#voiceBox{
display:none;
margin-top:20px;
}

#messages{
height:250px;
overflow-y:auto;
border:1px solid #00ff9d;
padding:10px;
width:400px;
margin:auto;
background:black;
}

img{
max-width:200px;
display:block;
margin-top:5px;
}
</style>
</head>

<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setName()">Set Name</button>

<br>

<input id="roomName" placeholder="room name">
<input id="roomPass" placeholder="password (optional)">
<select id="roomType">
<option value="chat">Chat Room</option>
<option value="voice">Voice Room</option>
</select>

<button onclick="createRoom()">Create Room</button>

<h2>Available Rooms</h2>
<div id="rooms"></div>

<div id="chatBox">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="msg" placeholder="message">

<input type="file" id="imgUpload">

<br>

<button onclick="send()">Send</button>
<button onclick="leave()">Leave</button>

</div>

<div id="voiceBox">

<h3 id="voiceTitle"></h3>

<button onclick="startVC()">Start Voice</button>
<button onclick="leave()">Leave</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let name=""
let currentRoom=""
let roomType=""

function setName(){

name=document.getElementById("username").value

alert("Name set to "+name)

}

function createRoom(){

let room=document.getElementById("roomName").value
let pass=document.getElementById("roomPass").value
let type=document.getElementById("roomType").value

if(room=="")return alert("enter room name")

db.ref("rooms/"+room).set({
pass:pass,
type:type
})

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let rooms=document.getElementById("rooms")

rooms.innerHTML=""

snap.forEach(child=>{

let r=child.key
let data=child.val()

let div=document.createElement("div")

div.className="room"

div.innerText=data.pass? r+" 🔒":r

div.onclick=()=>joinRoom(r,data)

rooms.appendChild(div)

})

})

}

function joinRoom(room,data){

if(data.pass){

let p=prompt("Enter password")

if(p!==data.pass){

alert("wrong password")

return

}

}

currentRoom=room
roomType=data.type

document.getElementById("roomTitle").innerText=room
document.getElementById("voiceTitle").innerText=room

if(roomType=="chat"){

document.getElementById("chatBox").style.display="block"
document.getElementById("voiceBox").style.display="none"

listenMessages()

}else{

document.getElementById("chatBox").style.display="none"
document.getElementById("voiceBox").style.display="block"

}

}

function listenMessages(){

db.ref("messages/"+currentRoom).on("value",snap=>{

let box=document.getElementById("messages")

box.innerHTML=""

snap.forEach(c=>{

let m=c.val()

let div=document.createElement("div")

if(m.text){

div.innerText=m.user+": "+m.text

}

if(m.img){

let img=document.createElement("img")

img.src=m.img

div.appendChild(img)

}

box.appendChild(div)

})

})

}

function send(){

let text=document.getElementById("msg").value

let file=document.getElementById("imgUpload").files[0]

let data={user:name}

if(text)data.text=text

if(file)data.img=URL.createObjectURL(file)

db.ref("messages/"+currentRoom).push(data)

document.getElementById("msg").value=""
document.getElementById("imgUpload").value=""

}

function leave(){

currentRoom=""

document.getElementById("chatBox").style.display="none"
document.getElementById("voiceBox").style.display="none"

}

async function startVC(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

let audio=new Audio()

audio.srcObject=stream

audio.play()

}

loadRooms()

</script>

</body>
</html>
