<!DOCTYPE html>
<html>
<head>

<title>Stealth Chat</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9c;
}

input,button,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00ff9c;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1a1a1a;
padding:10px;
margin:6px auto;
width:260px;
border-radius:6px;
cursor:pointer;
}

#chatBox{
display:none;
margin-top:20px;
}

#messages{
height:300px;
width:420px;
margin:auto;
overflow-y:auto;
background:black;
border:1px solid #00ff9c;
padding:10px;
text-align:left;
}

img{
max-width:200px;
display:block;
margin-top:6px;
}

</style>

</head>
<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setName()">Set Username</button>

<br><br>

<input id="roomName" placeholder="room name">

<select id="roomType">
<option value="chat">Chat Room</option>
<option value="voice">Voice Room</option>
</select>

<input id="roomPassword" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

<div id="chatBox">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<br>

<input id="message" placeholder="message">

<input type="file" id="imageUpload">

<br>

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">Start Voice</button>

<button onclick="leaveRoom()">Leave Room</button>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>


<script>

const firebaseConfig = {
  
apiKey: "AIzaSyC3zgBQLFgUhHHJPITNeyGobAiLCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
databaseURL: "https://random-chat-2ed9a-default-rtdb.firebaseio.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

let username=""
let currentRoom=""



function setName(){

username=document.getElementById("username").value

if(username==""){
alert("enter username")
return
}

alert("username set")

}



function createRoom(){

let room=document.getElementById("roomName").value
let password=document.getElementById("roomPassword").value
let type=document.getElementById("roomType").value

if(room==""){
alert("enter room name")
return
}

db.ref("rooms/"+room).set({

password:password,
type:type

})

}



function loadRooms(){

db.ref("rooms").on("value",snap=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snap.forEach(child=>{

let room=child.key
let data=child.val()

let icon="💬"

if(data.type=="voice"){
icon="🔊"
}

let div=document.createElement("div")

div.className="room"

if(data.password){

div.innerText=room+" "+icon+" 🔒"

}else{

div.innerText=room+" "+icon

}

div.onclick=function(){

joinRoom(room,data)

}

roomsDiv.appendChild(div)

})

})

}



function joinRoom(room,data){

if(data.password){

let p=prompt("Enter password")

if(p!=data.password){
alert("Wrong password")
return
}

}

currentRoom=room

document.getElementById("chatBox").style.display="block"

document.getElementById("roomTitle").innerText="Room: "+room

document.getElementById("messages").innerHTML=""

listenMessages()

}



function listenMessages(){

db.ref("messages/"+currentRoom).off()

db.ref("messages/"+currentRoom).on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

if(m.text){

div.innerText=m.user+": "+m.text

}

if(m.img){

let img=document.createElement("img")

img.src=m.img

div.appendChild(img)

}

document.getElementById("messages").appendChild(div)

})

}



function sendMessage(){

let text=document.getElementById("message").value
let file=document.getElementById("imageUpload").files[0]

if(text=="" && !file){
return
}

if(file){

let reader=new FileReader()

reader.onload=function(e){

db.ref("messages/"+currentRoom).push({

user:username,
text:text,
img:e.target.result

})

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push({

user:username,
text:text

})

}

document.getElementById("message").value=""
document.getElementById("imageUpload").value=""

}



function startVoice(){

navigator.mediaDevices.getUserMedia({audio:true})

.then(stream=>{

alert("Voice chat started (mic active)")

})

.catch(()=>{

alert("Mic blocked")

})

}



function leaveRoom(){

currentRoom=""

document.getElementById("messages").innerHTML=""

document.getElementById("chatBox").style.display="none"

}



loadRooms()

</script>

</body>
</html>
