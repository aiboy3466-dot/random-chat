<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stealth Chat</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9d;
}

input,button{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

button{
background:#00ff9d;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1b1b1b;
padding:10px;
margin:6px auto;
width:260px;
border-radius:6px;
cursor:pointer;
}

#chatBox{
display:none;
margin-top:20px;
}

#messages{
height:300px;
overflow-y:auto;
background:black;
border:1px solid #00ff9d;
padding:10px;
width:420px;
margin:auto;
}

img{
max-width:200px;
display:block;
margin-top:6px;
}

</style>
</head>

<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setName()">Set Username</button>

<br>

<input id="roomName" placeholder="room name">
<input id="roomPassword" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h2>Rooms</h2>
<div id="rooms"></div>

<div id="chatBox">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="message" placeholder="message">
<input type="file" id="imgUpload">

<br>

<button onclick="send()">Send</button>
<button onclick="startVoice()">Voice Chat</button>
<button onclick="leaveRoom()">Leave</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let username=""
let currentRoom=""

function setName(){

username=document.getElementById("username").value

if(username==""){
alert("Enter username")
return
}

alert("Username set: "+username)

}

function createRoom(){

let room=document.getElementById("roomName").value
let pass=document.getElementById("roomPassword").value

if(room==""){
alert("Enter room name")
return
}

db.ref("rooms/"+room).set({
password:pass
})

}

function loadRooms(){

db.ref("rooms").on("value",snapshot=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snapshot.forEach(child=>{

let data=child.val()
let room=child.key

let div=document.createElement("div")

div.className="room"

div.innerText=data.password?room+" 🔒":room

div.onclick=()=>joinRoom(room,data)

roomsDiv.appendChild(div)

})

})

}

function joinRoom(room,data){

if(data.password){

let p=prompt("Enter password")

if(p!==data.password){
alert("Wrong password")
return
}

}

currentRoom=room

document.getElementById("chatBox").style.display="block"

document.getElementById("roomTitle").innerText=room

listenMessages()

}

function listenMessages(){

db.ref("messages/"+currentRoom).on("value",snapshot=>{

let box=document.getElementById("messages")

box.innerHTML=""

snapshot.forEach(child=>{

let m=child.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){
let img=document.createElement("img")
img.src=m.img
div.appendChild(img)
}

box.appendChild(div)

})

box.scrollTop=box.scrollHeight

})

}

function send(){

let text=document.getElementById("message").value
let file=document.getElementById("imgUpload").files[0]

let data={user:username,text:text}

if(file){

let reader=new FileReader()

reader.onload=function(e){

data.img=e.target.result
db.ref("messages/"+currentRoom).push(data)

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push(data)

}

document.getElementById("message").value=""
document.getElementById("imgUpload").value=""

}

function leaveRoom(){

currentRoom=""
document.getElementById("chatBox").style.display="none"

}

async function startVoice(){

try{

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

let audio=new Audio()

audio.srcObject=stream

audio.play()

alert("Voice chat started")

}catch(e){

alert("Microphone blocked")

}

}

loadRooms()

</script>

</body>
</html>
