<!DOCTYPE html>
<html>
<head>
  <title>Chat & Voice Rooms</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    #roomUI { margin: 20px; }
    .chatBox, .voiceBox { border: 1px solid #ccc; padding: 10px; background: #fff; width: 300px; }
    .messages { height: 200px; overflow-y: scroll; border: 1px solid #ddd; margin-bottom: 10px; padding: 5px; }
    .message { margin-bottom: 5px; }
    .message img { max-width: 100px; display: block; margin-top: 5px; }
  </style>
</head>
<body>

<h2>Join a Room</h2>
<input type="text" id="roomName" placeholder="Room name">
<button onclick="joinChatRoom()">Join Chat Room</button>
<button onclick="joinVoiceRoom()">Join Voice Room</button>
<button onclick="leaveRoom()">Leave Room</button>

<div id="roomUI"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
  // ===========================
  // Firebase setup - CHANGE THIS
  // ===========================
const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  // ===========================
  // Globals
  // ===========================
  let currentRoom = null;
  let userId = 'user_' + Math.floor(Math.random() * 1000000);
  let localStream = null;
  let peerConnections = {};

  // ===========================
  // Join Chat Room
  // ===========================
  function joinChatRoom() {
    leaveRoom();
    const room = document.getElementById("roomName").value;
    if (!room) return alert("Enter a room name");

    currentRoom = room;

    // Add user to Firestore
    db.collection("rooms").doc(room).collection("users").doc(userId).set({ joined: Date.now() });

    // Setup UI
    document.getElementById("roomUI").innerHTML = `
      <div class="chatBox">
        <div class="messages" id="messages"></div>
        <input type="text" id="msgInput" placeholder="Type a message">
        <input type="file" id="imgInput">
        <button onclick="sendMessage()">Send</button>
      </div>
    `;

    // Listen to messages
    db.collection("rooms").doc(room).collection("messages")
      .orderBy("time").onSnapshot(snapshot => {
        const msgDiv = document.getElementById("messages");
        msgDiv.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.classList.add("message");
          div.innerHTML = `<strong>${data.user}:</strong> ${data.text || ''}`;
          if(data.imageURL) {
            const img = document.createElement("img");
            img.src = data.imageURL;
            div.appendChild(img);
          }
          msgDiv.appendChild(div);
          msgDiv.scrollTop = msgDiv.scrollHeight;
        });
      });
  }

  // ===========================
  // Send Message (Text or Image)
  // ===========================
  async function sendMessage() {
    const text = document.getElementById("msgInput").value;
    const file = document.getElementById("imgInput").files[0];
    let imageURL = null;

    if(file) {
      const ref = storage.ref().child(`images/${Date.now()}_${file.name}`);
      await ref.put(file);
      imageURL = await ref.getDownloadURL();
      document.getElementById("imgInput").value = '';
    }

    if(!text && !imageURL) return;

    db.collection("rooms").doc(currentRoom).collection("messages").add({
      user: userId,
      text: text,
      imageURL: imageURL || null,
      time: Date.now()
    });

    document.getElementById("msgInput").value = '';
  }

  // ===========================
  // Join Voice Room
  // ===========================
  async function joinVoiceRoom() {
    leaveRoom();
    const room = document.getElementById("roomName").value;
    if(!room) return alert("Enter a room name");

    currentRoom = room;
    db.collection("rooms").doc(room).collection("users").doc(userId).set({ joined: Date.now() });

    document.getElementById("roomUI").innerHTML = `
      <div class="voiceBox">
        <h3>Voice Room: ${room}</h3>
        <button onclick="startVoice()">Start Voice</button>
        <div id="peers"></div>
      </div>
    `;
  }

  async function startVoice() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const roomRef = db.collection("rooms").doc(currentRoom);
    const usersRef = roomRef.collection("users");

    // Listen for other users joining
    usersRef.onSnapshot(snapshot => {
      snapshot.docChanges().forEach(change => {
        if(change.type === 'added' && change.doc.id !== userId){
          startPeer(change.doc.id);
        }
      });
    });
  }

  // Basic WebRTC peer connection (audio only)
  async function startPeer(peerId) {
    if(peerConnections[peerId]) return;

    const pc = new RTCPeerConnection();
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (event) => {
      let audio = document.getElementById('audio_' + peerId);
      if(!audio){
        audio = document.createElement('audio');
        audio.id = 'audio_' + peerId;
        audio.autoplay = true;
        document.getElementById("peers").appendChild(audio);
      }
      audio.srcObject = event.streams[0];
    };

    peerConnections[peerId] = pc;
    // Note: Full signaling (offer/answer) via Firestore is needed for real multi-user audio
  }

  // ===========================
  // Leave Room
  // ===========================
  function leaveRoom() {
    if(!currentRoom) return;

    // Remove user from Firestore
    db.collection("rooms").doc(currentRoom).collection("users").doc(userId).delete();
    currentRoom = null;
    document.getElementById("roomUI").innerHTML = "";

    // Stop local audio
    if(localStream){
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
  }

  // ===========================
  // Cleanup on tab close
  // ===========================
  window.addEventListener("beforeunload", () => {
    leaveRoom();
  });

</script>
</body>
</html>
