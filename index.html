<!DOCTYPE html>
<html>
<head>
<title>Stealth Chat</title>
<meta charset="UTF-8">

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9d;
}

input,button{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

button{
background:#00ff9d;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1a1a1a;
padding:10px;
margin:6px auto;
width:260px;
border-radius:6px;
cursor:pointer;
}

#chat{
display:none;
margin-top:20px;
}

#messages{
height:300px;
overflow-y:auto;
background:black;
border:1px solid #00ff9d;
padding:10px;
width:420px;
margin:auto;
}

img{
max-width:200px;
display:block;
margin-top:6px;
}

</style>
</head>

<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setName()">Set Username</button>

<br>

<input id="roomName" placeholder="room name">

<button onclick="createRoom()">Create Room</button>

<h2>Rooms</h2>

<div id="rooms"></div>

<div id="chat">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="message" placeholder="message">

<input type="file" id="img">

<br>

<button onclick="send()">Send</button>
<button onclick="leave()">Leave</button>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>

const firebaseConfig={
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore()
const storage=firebase.storage()

let username=""
let currentRoom=""

function setName(){

username=document.getElementById("username").value

alert("Username set to "+username)

}

function createRoom(){

let room=document.getElementById("roomName").value

if(room===""){
alert("enter room name")
return
}

db.collection("rooms").doc(room).set({
created:Date.now()
})

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snapshot.forEach(doc=>{

let div=document.createElement("div")

div.className="room"

div.innerText=doc.id

div.onclick=()=>joinRoom(doc.id)

roomsDiv.appendChild(div)

})

})

}

function joinRoom(room){

currentRoom=room

document.getElementById("chat").style.display="block"

document.getElementById("roomTitle").innerText=room

listenMessages()

}

function listenMessages(){

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let box=document.getElementById("messages")

box.innerHTML=""

snapshot.forEach(doc=>{

let m=doc.data()

let div=document.createElement("div")

if(m.text){

div.innerText=m.user+": "+m.text

}

if(m.img){

let img=document.createElement("img")

img.src=m.img

div.appendChild(img)

}

box.appendChild(div)

box.scrollTop=box.scrollHeight

})

})

}

async function send(){

let text=document.getElementById("message").value
let file=document.getElementById("img").files[0]

let imgURL=""

if(file){

let ref=storage.ref("images/"+Date.now()+file.name)

await ref.put(file)

imgURL=await ref.getDownloadURL()

}

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.add({

user:username,
text:text,
img:imgURL,
time:Date.now()

})

document.getElementById("message").value=""
document.getElementById("img").value=""

}

function leave(){

currentRoom=""

document.getElementById("chat").style.display="none"

}

loadRooms()

</script>

</body>
</html>
