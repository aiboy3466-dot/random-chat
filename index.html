<!DOCTYPE html>
<html>
<head>

<title>Chat Rooms</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

#main{
width:70%;
margin:auto;
}

#rooms{
border:1px solid gray;
padding:15px;
background:#1a1a1a;
margin-bottom:20px;
}

.room{
border-bottom:1px solid gray;
padding:10px;
}

#chat{
border:1px solid gray;
height:300px;
overflow:auto;
padding:10px;
background:#1a1a1a;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
cursor:pointer;
}

#online{
margin:10px;
color:#00ff9c;
}

</style>

</head>

<body>

<h1>Public Chat Rooms</h1>

<div id="online">Users online: 0</div>

<div id="main">

<input id="username" placeholder="Your username">

<br>

<input id="roomName" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

<h3 id="roomTitle"></h3>

<div id="chat"></div>

<br>

<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

let userId=Math.random().toString(36).substring(2);
let currentRoom=null;

const badWords=["fuck","shit","bitch","ass","nigger",];

function filter(text){

badWords.forEach(word=>{
let r=new RegExp(word,"gi");
text=text.replace(r,"****");
});

return text;

}

function updateOnline(){

db.collection("online").doc(userId).set({
time:Date.now()
});

db.collection("online").onSnapshot(s=>{
document.getElementById("online").innerText="Users online: "+s.size;
});

}

function createRoom(){

let name=document.getElementById("roomName").value;

if(!name)return;

db.collection("rooms").doc(name).set({
users:1
});

joinRoom(name);

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let data=doc.data();

html+=`
<div class="room">
<b>${doc.id}</b> (${data.users || 0} users)
<button onclick="joinRoom('${doc.id}')">Join</button>
</div>
`;

});

document.getElementById("rooms").innerHTML=html;

});

}

function joinRoom(room){

currentRoom=room;

document.getElementById("roomTitle").innerText="Room: "+room;

let ref=db.collection("rooms").doc(room);

ref.update({
users:firebase.firestore.FieldValue.increment(1)
});

ref.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
html+="<p>"+doc.data().text+"</p>";
});

document.getElementById("chat").innerHTML=html;

});

}

function send(){

if(!currentRoom)return;

let name=document.getElementById("username").value||"Anonymous";

let message=document.getElementById("msg").value;

message=filter(message);

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.add({
text:name+": "+message,
time:Date.now()
});

document.getElementById("msg").value="";

}

window.addEventListener("beforeunload",()=>{

db.collection("online").doc(userId).delete();

if(currentRoom){

let ref=db.collection("rooms").doc(currentRoom);

ref.get().then(doc=>{

if(doc.exists){

let users=doc.data().users-1;

if(users<=0){

ref.delete();

}else{

ref.update({users:users});

}

}

});

}

});

updateOnline();
loadRooms();

</script>

</body>
</html>
