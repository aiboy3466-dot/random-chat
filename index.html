<!DOCTYPE html>
<html>
<head>
<title>Stealth Chat</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ff9c;
}

input,button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00ff9c;
cursor:pointer;
}

#rooms{
margin-top:20px;
}

.room{
background:#1c1c1c;
margin:6px auto;
padding:10px;
width:260px;
border-radius:6px;
cursor:pointer;
}

#chat{
display:none;
margin-top:20px;
}

#messages{
height:300px;
width:420px;
margin:auto;
overflow-y:auto;
background:black;
border:1px solid #00ff9c;
padding:10px;
}

img{
max-width:200px;
display:block;
margin-top:6px;
}

</style>

</head>
<body>

<h1>Stealth Chat</h1>

<input id="username" placeholder="username">
<button onclick="setUsername()">Set Username</button>

<br><br>

<input id="roomName" placeholder="room name">
<input id="roomPass" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h2>Available Rooms</h2>

<div id="rooms"></div>

<div id="chat">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<input id="message" placeholder="message">
<input type="file" id="image">

<br>

<button onclick="sendMessage()">Send</button>
<button onclick="leaveRoom()">Leave Room</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let username=""
let currentRoom=""

function setUsername(){

username=document.getElementById("username").value

if(username==""){
alert("enter username")
return
}

alert("username set: "+username)

}

function createRoom(){

let name=document.getElementById("roomName").value
let pass=document.getElementById("roomPass").value

if(name==""){
alert("enter room name")
return
}

db.ref("rooms/"+name).set({
password:pass
})

alert("room created")

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snap.forEach(child=>{

let data=child.val()
let room=child.key

let div=document.createElement("div")

div.className="room"

if(data.password){
div.innerText=room+" 🔒"
}else{
div.innerText=room
}

div.onclick=function(){
joinRoom(room,data)
}

roomsDiv.appendChild(div)

})

})

}

function joinRoom(room,data){

if(data.password){

let p=prompt("enter password")

if(p!=data.password){
alert("wrong password")
return
}

}

currentRoom=room

document.getElementById("chat").style.display="block"
document.getElementById("roomTitle").innerText=room

listenMessages()

}

function listenMessages(){

db.ref("messages/"+currentRoom).on("value",snap=>{

let box=document.getElementById("messages")

box.innerHTML=""

snap.forEach(child=>{

let m=child.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){

let img=document.createElement("img")

img.src=m.img

div.appendChild(img)

}

box.appendChild(div)

})

box.scrollTop=box.scrollHeight

})

}

function sendMessage(){

let text=document.getElementById("message").value
let file=document.getElementById("image").files[0]

let msg={
user:username,
text:text
}

if(file){

let reader=new FileReader()

reader.onload=function(e){

msg.img=e.target.result

db.ref("messages/"+currentRoom).push(msg)

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push(msg)

}

document.getElementById("message").value=""
document.getElementById("image").value=""

}

function leaveRoom(){

currentRoom=""

document.getElementById("chat").style.display="none"

}

loadRooms()

</script>

</body>
</html>
