<!DOCTYPE html>
<html>
<head>
  <title>Chat + Voice Rooms</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
<h1>Chat & Voice Rooms</h1>

<!-- Room selection -->
<label>Room ID: <input type="text" id="roomId"></label>
<button onclick="joinRoom('chat')">Join Chat Room</button>
<button onclick="joinRoom('voice')">Join Voice Room</button>
<button onclick="leaveRoom()">Leave Room</button>

<!-- Chat container -->
<div id="chatContainer" style="display:none;">
  <h2>Text Chat</h2>
  <div id="messages" style="border:1px solid #ccc;height:200px;overflow-y:auto;"></div>
  <input type="text" id="chatInput" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Voice container -->
<div id="voiceContainer" style="display:none;">
  <h2>Voice Chat</h2>
  <p id="voiceStatus">Voice chat not started</p>
  <audio id="remoteAudio" autoplay></audio>
</div>

<script>
  // ===== Firebase Setup =====
const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let currentRoomId = null;
  let currentRoomType = null;
  let localStream;
  let peerConnection;

  // ===== Authentication (anonymous) =====
  firebase.auth().signInAnonymously();

  // ===== Room functions =====
  function joinRoom(type) {
    currentRoomId = document.getElementById("roomId").value.trim();
    if (!currentRoomId) { alert("Enter a room ID"); return; }
    currentRoomType = type;

    if(type === "chat") {
      document.getElementById("chatContainer").style.display = "block";
      document.getElementById("voiceContainer").style.display = "none";
      setupChat();
    } else if(type === "voice") {
      document.getElementById("voiceContainer").style.display = "block";
      document.getElementById("chatContainer").style.display = "none";
      startVoiceChat();
    }
  }

  function leaveRoom() {
    document.getElementById("chatContainer").style.display = "none";
    document.getElementById("voiceContainer").style.display = "none";

    if(peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    if(localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }

    if(currentRoomId && currentRoomType){
      db.collection(currentRoomType + "Rooms").doc(currentRoomId).collection("users")
        .doc(firebase.auth().currentUser.uid).delete();
    }

    currentRoomId = null;
    currentRoomType = null;
  }

  // ===== Chat functions =====
  function setupChat() {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";
    db.collection("chatRooms").doc(currentRoomId).collection("messages")
      .orderBy("timestamp")
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = "";
        snapshot.forEach(doc => {
          const msg = doc.data();
          messagesDiv.innerHTML += "<div><b>" + msg.user + ":</b> " + msg.text + "</div>";
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  function sendMessage() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text) return;
    db.collection("chatRooms").doc(currentRoomId).collection("messages").add({
      text,
      user: firebase.auth().currentUser.uid,
      timestamp: Date.now()
    });
    input.value = "";
  }

  // ===== Voice functions =====
  async function startVoiceChat() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      document.getElementById("voiceStatus").innerText = "Voice chat ready!";
      setupPeerConnection();
      await createOffer();
    } catch (err) {
      alert("Microphone access denied: " + err.message);
    }
  }

  function setupPeerConnection() {
    peerConnection = new RTCPeerConnection({ iceServers:[{ urls: "stun:stun.l.google.com:19302" }] });
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

    peerConnection.ontrack = event => {
      const audio = document.getElementById("remoteAudio");
      audio.srcObject = event.streams[0];
    };

    peerConnection.onicecandidate = event => {
      if(event.candidate){
        db.collection("voiceRooms").doc(currentRoomId).collection("candidates")
          .add({ candidate: event.candidate.toJSON() });
      }
    };

    // Listen for remote offer/answer
    const roomRef = db.collection("voiceRooms").doc(currentRoomId);
    roomRef.onSnapshot(async snapshot => {
      const data = snapshot.data();
      if(!data) return;
      if(data.answer && peerConnection.remoteDescription === null){
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
      }
      if(data.offer && !peerConnection.localDescription){
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        roomRef.update({ answer: answer.toJSON() });
      }
    });

    // Listen for ICE candidates
    roomRef.collection("candidates").onSnapshot(snapshot => {
      snapshot.docChanges().forEach(async change => {
        if(change.type === "added"){
          const c = new RTCIceCandidate(change.doc.data().candidate);
          await peerConnection.addIceCandidate(c);
        }
      });
    });
  }

  async function createOffer() {
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    db.collection("voiceRooms").doc(currentRoomId).set({ offer: offer.toJSON() });
  }
</script>
</body>
</html>
