<!DOCTYPE html>
<html>
<head>
<title>StealthChat</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:15px;
font-size:22px;
color:#00ffa6;
box-shadow:0 0 10px #000;
}

.container{
margin-top:20px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#00ffa6;
cursor:pointer;
font-weight:bold;
}

#rooms{
margin-top:20px;
}

.room{
background:#1c1c1c;
padding:10px;
width:260px;
margin:8px auto;
border-radius:8px;
cursor:pointer;
}

.room:hover{
background:#2a2a2a;
}

#chatUI{
display:none;
margin-top:20px;
}

#messages{
background:black;
border:1px solid #00ffa6;
height:300px;
width:420px;
margin:auto;
overflow-y:auto;
padding:10px;
text-align:left;
}

img{
max-width:200px;
display:block;
margin-top:5px;
}

</style>

</head>
<body>

<header>Stealth Chat</header>

<div class="container">

<input id="username" placeholder="username">
<button onclick="setName()">Set Username</button>

<br>

<input id="roomName" placeholder="room name">
<input id="roomPass" placeholder="password optional">

<button onclick="createRoom()">Create Room</button>

<h3>Rooms</h3>

<div id="rooms"></div>

</div>

<div id="chatUI">

<h2 id="roomTitle"></h2>

<div id="messages"></div>

<br>

<input id="messageBox" placeholder="message">
<input type="file" id="imgUpload">

<br>

<button onclick="sendMessage()">Send</button>
<button onclick="leaveRoom()">Leave Room</button>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
  authDomain: "random-chat-2ed9a.firebaseapp.com",
  projectId: "random-chat-2ed9a",
  storageBucket: "random-chat-2ed9a.firebasestorage.app",
  messagingSenderId: "608975566065",
  appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let username=""
let currentRoom=""

function setName(){

username=document.getElementById("username").value

if(!username){
alert("enter username")
return
}

alert("username set")

}

function createRoom(){

let name=document.getElementById("roomName").value
let pass=document.getElementById("roomPass").value

if(!name){
alert("enter room name")
return
}

db.ref("rooms/"+name).set({
password:pass || "",
created:Date.now()
}).then(()=>{

joinRoom(name,{password:pass})

})

}

function loadRooms(){

db.ref("rooms").on("value",snap=>{

let roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

snap.forEach(child=>{

let room=child.key
let data=child.val()

let div=document.createElement("div")

div.className="room"

div.innerText=data.password? room+" 🔒":room

div.onclick=()=>joinRoom(room,data)

roomsDiv.appendChild(div)

})

})

}

function joinRoom(room,data){

if(data.password){

let p=prompt("Enter password")

if(p!==data.password){
alert("wrong password")
return
}

}

currentRoom=room

document.querySelector(".container").style.display="none"
document.getElementById("chatUI").style.display="block"
document.getElementById("roomTitle").innerText="Room: "+room

listenMessages()

}

function listenMessages(){

db.ref("messages/"+currentRoom).off()

db.ref("messages/"+currentRoom).on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

if(m.text){
div.innerText=m.user+": "+m.text
}

if(m.img){
let img=document.createElement("img")
img.src=m.img
div.appendChild(img)
}

document.getElementById("messages").appendChild(div)

})

}

function sendMessage(){

let text=document.getElementById("messageBox").value
let file=document.getElementById("imgUpload").files[0]

let msg={
user:username,
text:text
}

if(file){

let reader=new FileReader()

reader.onload=function(e){

msg.img=e.target.result

db.ref("messages/"+currentRoom).push(msg)

}

reader.readAsDataURL(file)

}else{

db.ref("messages/"+currentRoom).push(msg)

}

document.getElementById("messageBox").value=""
document.getElementById("imgUpload").value=""

}

function leaveRoom(){

currentRoom=""

document.getElementById("messages").innerHTML=""

document.getElementById("chatUI").style.display="none"
document.querySelector(".container").style.display="block"

}

loadRooms()

</script>

</body>
</html>
