<!DOCTYPE html>
<html>
<head>
<title>Chat Rooms</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

#rooms{
width:60%;
margin:auto;
padding:10px;
border:1px solid gray;
background:#1a1a1a;
}

#chat{
width:60%;
height:300px;
margin:auto;
overflow:auto;
border:1px solid gray;
padding:10px;
background:#1a1a1a;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

input{
padding:8px;
width:50%;
}

.room{
margin:10px;
padding:10px;
border-bottom:1px solid gray;
}

</style>
</head>

<body>

<h1>Public Chat Rooms</h1>

<button onclick="createRoom()">Create Room</button>

<h3>Available Rooms</h3>

<div id="rooms"></div>

<h3 id="roomTitle"></h3>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>const firebaseConfig = {
apiKey: "AIzaSyC3zgBQLFgUhHHJPlTNeyGobAilCVPEvBk",
authDomain: "random-chat-2ed9a.firebaseapp.com",
projectId: "random-chat-2ed9a",
storageBucket: "random-chat-2ed9a.firebasestorage.app",
messagingSenderId: "608975566065",
appId: "1:608975566065:web:e06cabb8b2286b3ca2a550"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

let userId = Math.random().toString(36).substring(2);
let currentRoom = null;

const badWords = ["fuck","shit","bitch","ass"];

function filter(text){

let clean = text;

badWords.forEach(word=>{

let reg = new RegExp(word,"gi");

clean = clean.replace(reg,"****");

});

return clean;

}

function createRoom(){

let roomId = "room_"+Math.floor(Math.random()*100000);

db.collection("rooms").doc(roomId).set({
users:1,
created:Date.now()
});

joinRoom(roomId);

}

function loadRooms(){

db.collection("rooms").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let data = doc.data();

html += `
<div class="room">
<b>${doc.id}</b>  
(${data.users || 0} users)
<button onclick="joinRoom('${doc.id}')">Join</button>
</div>
`;

});

document.getElementById("rooms").innerHTML = html;

});

}

function joinRoom(roomId){

currentRoom = roomId;

document.getElementById("roomTitle").innerText="Room: "+roomId;

let roomRef = db.collection("rooms").doc(roomId);

roomRef.update({
users:firebase.firestore.FieldValue.increment(1)
});

roomRef.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

let chat="";

snapshot.forEach(doc=>{

chat += "<p>"+doc.data().text+"</p>";

});

document.getElementById("chat").innerHTML = chat;

});

}

function send(){

if(!currentRoom) return;

let message = document.getElementById("msg").value;

message = filter(message);

db.collection("rooms")
.doc(currentRoom)
.collection("messages")
.add({

text:message,
time:Date.now()

});

document.getElementById("msg").value="";

}

window.addEventListener("beforeunload",()=>{

if(currentRoom){

let roomRef = db.collection("rooms").doc(currentRoom);

roomRef.get().then(doc=>{

if(doc.exists){

let users = doc.data().users-1;

if(users<=0){

roomRef.delete();

}else{

roomRef.update({users:users});

}

}

});

}

});

loadRooms();

</script>

</body>
</html>
